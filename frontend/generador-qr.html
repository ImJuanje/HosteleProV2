<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de QR por mesa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --pizarra: #1c2321;
    --pizarra-alta: #262f2c;
    --tiza: #f2ede3;
    --tiza-tenue: #b7c2bc;
    --mostaza: #e0a638;
    --oliva: #7c9070;
    --linea: #3a4441;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--pizarra);
    color: var(--tiza);
    font-family: 'Inter', system-ui, sans-serif;
    padding: 24px;
  }
  h1 {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    margin: 0 0 4px;
  }
  p.ayuda {
    color: var(--tiza-tenue);
    font-size: 13px;
    margin: 0 0 24px;
    max-width: 60ch;
  }
  .panel-config {
    background: var(--pizarra-alta);
    border: 1px solid var(--linea);
    border-radius: 10px;
    padding: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: flex-end;
    margin-bottom: 28px;
  }
  .campo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .campo label {
    font-size: 12px;
    color: var(--tiza-tenue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .campo input {
    background: var(--pizarra);
    border: 1px solid var(--linea);
    color: var(--tiza);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }
  #urlBase { min-width: 320px; }
  button#generar {
    background: var(--oliva);
    color: var(--pizarra);
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #rejillaQr {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }
  .tarjeta-qr {
    background: #ffffff;
    color: #1c2321;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .tarjeta-qr .mesa-num {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    margin-top: 10px;
  }
  .tarjeta-qr .url-mostrada {
    font-size: 10px;
    color: #666;
    word-break: break-all;
    margin-top: 4px;
  }
  @media print {
    .panel-config, h1, p.ayuda { display: none; }
    body { background: white; padding: 0; }
    #rejillaQr { gap: 14px; }
    .tarjeta-qr { break-inside: avoid; border: 1px dashed #999; }
  }
</style>
</head>
<body>

<h1>Generador de QR por mesa</h1>
<p class="ayuda">
  Pon la URL donde publicaste la carta digital y la URL del backend. Las mesas se traen directamente
  de <code>/api/mesas</code> — si generas o borras mesas desde el backend, aquí se actualizan solas,
  sin riesgo de que se desincronicen entre esta herramienta y la pantalla de camarero.
</p>

<div class="panel-config">
  <div class="campo">
    <label for="urlBase">URL de la carta</label>
    <input type="text" id="urlBase" placeholder="https://tu-restaurante.netlify.app/carta/" value="https://hosteleprov2.netlify.app/carta/">
  </div>
  <div class="campo">
    <label for="urlBackend">URL del backend</label>
    <input type="text" id="urlBackend" placeholder="https://tu-backend.up.railway.app" value="https://hosteleprov2-production.up.railway.app">
  </div>
  <button id="generar">Cargar mesas y generar QR</button>
  <button id="imprimir" onclick="window.print()" style="background: transparent; border: 1px solid var(--linea); color: var(--tiza); border-radius: 6px; padding: 10px 18px; cursor: pointer;">Imprimir</button>
</div>

<p id="mensajeEstado" class="ayuda"></p>

<div id="rejillaQr"></div>

<script>
async function generarQr() {
  let urlBase = document.getElementById("urlBase").value.trim();
  const urlBackend = document.getElementById("urlBackend").value.trim();
  const rejilla = document.getElementById("rejillaQr");
  const mensajeEstado = document.getElementById("mensajeEstado");
  rejilla.innerHTML = "";
  mensajeEstado.textContent = "";

  if (!urlBase || !urlBackend) {
    alert("Pon la URL de la carta y la URL del backend.");
    return;
  }

  // Si falta el protocolo, el móvil no lo reconoce como enlace y lo manda
  // al buscador en vez de abrirlo. Lo añadimos por si acaso.
  if (!/^https?:\/\//i.test(urlBase)) {
    urlBase = "https://" + urlBase;
  }

  let mesas;
  try {
    mensajeEstado.textContent = "Cargando mesas desde el backend...";
    const respuesta = await fetch(urlBackend.replace(/\/$/, "") + "/api/mesas");
    if (!respuesta.ok) throw new Error("Respuesta no válida");
    mesas = await respuesta.json();
    mensajeEstado.textContent = `${mesas.length} mesas cargadas desde el backend.`;
  } catch (error) {
    mensajeEstado.textContent = "";
    alert("No se pudo conectar con el backend en " + urlBackend + ". Comprueba la URL y que esté desplegado.");
    return;
  }

  mesas.forEach(mesa => {
    const separador = urlBase.includes("?") ? "&" : "?";
    const urlMesa = `${urlBase}${separador}mesa=${mesa.numero}`;

    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-qr";

    const contenedorQr = document.createElement("div");
    tarjeta.appendChild(contenedorQr);

    const numLabel = document.createElement("div");
    numLabel.className = "mesa-num";
    numLabel.textContent = "MESA " + mesa.numero;
    tarjeta.appendChild(numLabel);

    const urlLabel = document.createElement("div");
    urlLabel.className = "url-mostrada";
    urlLabel.textContent = urlMesa;
    tarjeta.appendChild(urlLabel);

    rejilla.appendChild(tarjeta);

    new QRCode(contenedorQr, {
      text: urlMesa,
      width: 160,
      height: 160,
      colorDark: "#1c2321",
      colorLight: "#ffffff"
    });
  });
}

document.getElementById("generar").addEventListener("click", generarQr);
window.addEventListener("load", generarQr);
</script>
</body>
</html>
