<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Digital</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  /* ============================================
     CONFIG VISUAL — token system
     Cambia estas variables para "tematizar" cada
     restaurante cliente sin tocar el resto del CSS.
     ============================================ */
  :root {
    --pizarra:        #1c2321;   /* fondo, negro-verdoso de pizarra real */
    --pizarra-alta:    #262f2c;  /* superficies elevadas (cards) */
    --tiza:           #f2ede3;   /* texto principal, blanco tiza */
    --tiza-tenue:     #b7c2bc;   /* texto secundario */
    --mostaza:        #e0a638;   /* acento — tiza de color para precios */
    --oliva:          #7c9070;   /* acento secundario — aceituna */
    --linea:          #3a4441;   /* líneas divisoras */
    --radio: 10px;

    --f-display: 'Caveat', cursive;      /* rótulo a mano */
    --f-cuerpo: 'Inter', system-ui, sans-serif;
    --f-ticket: 'Space Mono', monospace; /* precios / datos */
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--pizarra);
    color: var(--tiza);
    font-family: var(--f-cuerpo);
    -webkit-font-smoothing: antialiased;
    padding-bottom: 48px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  /* ---------- Cabecera ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--pizarra);
    padding: 18px 20px 0;
    border-bottom: 1px solid var(--linea);
  }

  .marca {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .marca h1 {
    font-family: var(--f-display);
    font-size: clamp(28px, 7vw, 40px);
    font-weight: 700;
    margin: 0;
    color: var(--tiza);
    letter-spacing: 0.5px;
  }

  .mesa-tag {
    font-family: var(--f-ticket);
    font-size: 11px;
    color: var(--pizarra);
    background: var(--mostaza);
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .subtitulo {
    font-size: 13px;
    color: var(--tiza-tenue);
    margin: 2px 0 14px;
  }

  /* ---------- Tabs de categoría (estilo resguardo de ticket) ---------- */
  nav.categorias {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  nav.categorias::-webkit-scrollbar { display: none; }

  .tab-cat {
    flex: 0 0 auto;
    font-family: var(--f-ticket);
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--tiza-tenue);
    background: transparent;
    border: 1px solid var(--linea);
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    position: relative;
  }

  .tab-cat.activa {
    color: var(--pizarra);
    background: var(--tiza);
    border-color: var(--tiza);
  }

  .tab-cat:focus-visible,
  button:focus-visible,
  a:focus-visible {
    outline: 2px solid var(--mostaza);
    outline-offset: 2px;
  }

  /* ---------- Perforación de ticket: elemento firma ---------- */
  .perforacion {
    position: relative;
    height: 1px;
    margin: 6px 0 26px;
    border-top: 1px dashed var(--linea);
  }
  .perforacion::before,
  .perforacion::after {
    content: "";
    position: absolute;
    top: -7px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--pizarra);
    border: 1px solid var(--linea);
  }
  .perforacion::before { left: -20px; }
  .perforacion::after { right: -20px; }

  /* ---------- Secciones y platos ---------- */
  main {
    padding: 20px;
    max-width: 640px;
    margin: 0 auto;
  }

  .seccion { scroll-margin-top: 132px; }

  .seccion-titulo {
    font-family: var(--f-display);
    font-size: 26px;
    color: var(--mostaza);
    margin: 0 0 14px;
  }

  .plato {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--linea);
  }
  .plato:last-child { border-bottom: none; }

  .plato-nombre {
    font-weight: 600;
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .estrella {
    font-size: 12px;
    color: var(--mostaza);
  }

  .plato-desc {
    grid-column: 1 / 2;
    font-size: 13px;
    color: var(--tiza-tenue);
    line-height: 1.4;
    max-width: 46ch;
  }

  .plato-precio {
    grid-row: 1 / 3;
    grid-column: 2 / 3;
    font-family: var(--f-ticket);
    font-size: 15px;
    color: var(--mostaza);
    align-self: start;
    white-space: nowrap;
  }

  .alergenos {
    grid-column: 1 / 2;
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .alergeno {
    font-size: 10px;
    letter-spacing: 0.3px;
    color: var(--oliva);
    border: 1px solid var(--oliva);
    border-radius: 20px;
    padding: 1px 8px;
  }

  /* ---------- Botón añadir (se activa solo si pedidoActivo=true) ---------- */
  .btn-anadir {
    grid-row: 3;
    grid-column: 2 / 3;
    justify-self: end;
    margin-top: 6px;
    font-family: var(--f-ticket);
    font-size: 11px;
    color: var(--pizarra);
    background: var(--oliva);
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .btn-anadir:active { transform: scale(0.96); }

  /* ---------- Barra de pedido flotante ---------- */
  .barra-pedido {
    position: fixed;
    left: 20px;
    right: 20px;
    bottom: 16px;
    max-width: 600px;
    margin: 0 auto;
    background: var(--mostaza);
    color: var(--pizarra);
    border: none;
    border-radius: var(--radio);
    padding: 12px 18px;
    display: none;
    justify-content: space-between;
    align-items: center;
    font-family: var(--f-ticket);
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    z-index: 30;
    cursor: pointer;
    width: calc(100% - 40px);
  }
  .barra-pedido.visible { display: flex; }
  .barra-pedido strong { font-size: 15px; }
  .barra-pedido .ver-resumen { text-decoration: underline; }

  /* ---------- Overlay resumen de pedido (modal tipo ticket) ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 40;
  }
  .overlay.visible { display: flex; }

  .ticket-modal {
    background: var(--pizarra-alta);
    width: 100%;
    max-width: 600px;
    border-radius: 16px 16px 0 0;
    padding: 22px 20px 26px;
    max-height: 82vh;
    overflow-y: auto;
    border-top: 3px dashed var(--linea);
  }

  .ticket-modal-cabecera {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .ticket-modal h2 {
    font-family: var(--f-display);
    font-size: 26px;
    color: var(--tiza);
    margin: 0;
  }

  .cerrar-modal {
    background: none;
    border: none;
    color: var(--tiza-tenue);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }

  .ticket-modal .mesa-tag {
    display: inline-block;
    margin-bottom: 16px;
  }

  .ticket-fila {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px dashed var(--linea);
    font-family: var(--f-ticket);
    font-size: 13px;
  }

  .ticket-fila .nombre-item {
    font-family: var(--f-cuerpo);
    font-size: 14px;
    color: var(--tiza);
  }

  .ticket-fila .cantidad-item {
    color: var(--tiza-tenue);
  }

  .ticket-fila .quitar-item {
    background: none;
    border: 1px solid var(--linea);
    color: var(--tiza-tenue);
    border-radius: 6px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
  }

  .ticket-total {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-top: 16px;
    margin-top: 6px;
    font-family: var(--f-ticket);
  }
  .ticket-total span:first-child {
    font-size: 13px;
    color: var(--tiza-tenue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ticket-total span:last-child {
    font-size: 22px;
    color: var(--mostaza);
  }

  .btn-enviar-cocina {
    width: 100%;
    margin-top: 20px;
    background: var(--oliva);
    color: var(--pizarra);
    border: none;
    border-radius: var(--radio);
    padding: 16px;
    font-family: var(--f-ticket);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .btn-enviar-cocina:active { transform: scale(0.98); }
  .btn-enviar-cocina:disabled {
    opacity: 0.5;
    cursor: default;
  }

  .carrito-vacio {
    color: var(--tiza-tenue);
    font-size: 13px;
    padding: 20px 0 6px;
    text-align: center;
  }

  .nota-item{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:1px solid #ddd;
  border-radius:8px;
  resize:vertical;
  min-height:60px;
  font-size:14px;
}


  /* ---------- Cartel de confirmación ---------- */
  .overlay-confirmacion {
    position: fixed;
    inset: 0;
    background: var(--pizarra);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    text-align: center;
    padding: 20px;
  }
  .overlay-confirmacion.visible {
    display: flex;
    animation: aparecer 0.25s ease;
  }
  @keyframes aparecer {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .check-circulo {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 3px solid var(--oliva);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    color: var(--oliva);
    margin: 0 auto 20px;
  }

  .overlay-confirmacion h2 {
    font-family: var(--f-display);
    font-size: 30px;
    color: var(--tiza);
    margin: 0 0 8px;
  }

  .overlay-confirmacion p {
    font-family: var(--f-ticket);
    font-size: 13px;
    color: var(--tiza-tenue);
    margin: 0;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--tiza-tenue);
    margin-top: 40px;
    font-family: var(--f-ticket);
  }
</style>
</head>
<body>

<header>
  <div class="marca">
    <h1 id="nombreRestaurante">Bar El Rincón</h1>
    <span class="mesa-tag" id="mesaTag">MESA 7</span>
  </div>
  <p class="subtitulo">Tapas de siempre, sin prisa. Toca una categoría para ir directo.</p>
  <nav class="categorias" id="navCategorias"></nav>
</header>

<main id="contenido"></main>

<div class="barra-pedido" id="barraPedido">
  <span><strong id="totalUnidades">0</strong> uds. añadidas</span>
  <span class="ver-resumen">ver resumen ›</span>
</div>

<div class="overlay" id="overlayResumen">
  <div class="ticket-modal">
    <div class="ticket-modal-cabecera">
      <h2>Tu pedido</h2>
      <button class="cerrar-modal" id="cerrarModal" aria-label="Cerrar resumen">✕</button>
    </div>
    <span class="mesa-tag" id="mesaTagModal">MESA 7</span>
    <div id="listaCarrito"></div>
    <div class="ticket-total">
      <span>Total</span>
      <span id="totalModal">0,00 €</span>
    </div>
    <button class="btn-enviar-cocina" id="btnEnviarCocina">Confirmar y enviar a cocina</button>
  </div>
</div>

<div class="overlay-confirmacion" id="overlayConfirmacion">
  <div>
    <div class="check-circulo">✓</div>
    <h2>Pedido enviado</h2>
    <p id="textoConfirmacion">Cocina ha recibido tu pedido de la mesa 7</p>
  </div>
</div>

<footer>carta digital · actualizada hoy</footer>

<script>
/* ============================================
   CONFIG — esto es lo que cambia por cliente.
   Categorías y productos ya NO están aquí — vienen
   del backend (/api/carta), así el mismo dato que
   ve el cliente lo usan también camarero y cocina.
   ============================================ */
const CONFIG = {
  restaurante: {
    nombre: "Bar El Rincón",
    mesa: "MESA 7",
    pedidoActivo: true, // si es false, se oculta el botón "añadir" y la barra inferior
    servidorUrl: "https://hosteleprov2-production.up.railway.app" // backend en Railway
  }
};

// La mesa real viene del QR: cada mesa tiene su propia URL con ?mesa=N
// Si no hay parámetro (ej. estás probando la carta directamente), se usa
// la mesa de CONFIG como valor de demo.
const parametrosUrl = new URLSearchParams(window.location.search);
const mesaDesdeUrl = parametrosUrl.get("mesa");
if (mesaDesdeUrl) {
  CONFIG.restaurante.mesa = "MESA " + mesaDesdeUrl;
}

// ---------- Render ----------
const nav = document.getElementById("navCategorias");
const contenido = document.getElementById("contenido");
const barraPedido = document.getElementById("barraPedido");
document.getElementById("nombreRestaurante").textContent = CONFIG.restaurante.nombre;
document.getElementById("mesaTag").textContent = CONFIG.restaurante.mesa;

let carrito = []; // { id, nombre, precio, cantidad }

const socket = io(CONFIG.restaurante.servidorUrl);
socket.on("connect_error", () => {
  console.warn("No se pudo conectar con el backend de comandas en " + CONFIG.restaurante.servidorUrl);
});

const overlayResumen = document.getElementById("overlayResumen");
const overlayConfirmacion = document.getElementById("overlayConfirmacion");
const listaCarrito = document.getElementById("listaCarrito");
const btnEnviarCocina = document.getElementById("btnEnviarCocina");

document.getElementById("mesaTagModal").textContent = CONFIG.restaurante.mesa;
document.getElementById("textoConfirmacion").textContent =
  "Cocina ha recibido tu pedido de la " + CONFIG.restaurante.mesa.toLowerCase();

function formatoPrecio(n) {
  return n.toFixed(2).replace(".", ",") + " €";
}

function añadirAlCarrito(producto) {
  const existente = carrito.find(item => item.id === producto.id);
  if (existente) {
    existente.cantidad += 1;
  } else {
    carrito.push({ id: producto.id, nombre: producto.nombre, precio: producto.precio, cantidad: 1, notas:"" });
  }
  actualizarBarra();
}

function quitarDelCarrito(id) {
  carrito = carrito.filter(item => item.id !== id);
  renderResumenPedido();
  actualizarBarra();
}

function totalCarrito() {
  return carrito.reduce((suma, item) => suma + item.precio * item.cantidad, 0);
}

function unidadesCarrito() {
  return carrito.reduce((suma, item) => suma + item.cantidad, 0);
}

function actualizarBarra() {
  const uds = unidadesCarrito();
  document.getElementById("totalUnidades").textContent = uds;
  barraPedido.classList.toggle("visible", uds > 0);
}

function renderResumenPedido() {
  listaCarrito.innerHTML = "";

  if (carrito.length === 0) {
    listaCarrito.innerHTML = '<p class="carrito-vacio">Aún no has añadido nada.</p>';
    btnEnviarCocina.disabled = true;
  } else {
    btnEnviarCocina.disabled = false;
    carrito.forEach(item => {
      const fila = document.createElement("div");
      fila.className = "ticket-fila";
      fila.innerHTML = `
        <span class="nombre-item">${item.nombre}</span>
        <span class="cantidad-item">x${item.cantidad}</span>
        <span>${formatoPrecio(item.precio * item.cantidad)}</span>

        <textarea
          class="nota-item"
          placeholder="Ej: sin cebolla, poco hecha, sin gluten..."
        >${item.notas || ""}</textarea>
      `;
        const textarea = fila.querySelector(".nota-item");

          textarea.addEventListener("input", (e) => {
            item.notas = e.target.value;
          });


      const quitar = document.createElement("button");
      quitar.className = "quitar-item";
      quitar.textContent = "✕";
      quitar.setAttribute("aria-label", "Quitar " + item.nombre);
      quitar.addEventListener("click", () => quitarDelCarrito(item.id));
      fila.appendChild(quitar);
      listaCarrito.appendChild(fila);
    });
  }

  document.getElementById("totalModal").textContent = formatoPrecio(totalCarrito());
}

barraPedido.addEventListener("click", () => {
  renderResumenPedido();
  overlayResumen.classList.add("visible");
});

document.getElementById("cerrarModal").addEventListener("click", () => {
  overlayResumen.classList.remove("visible");
});

overlayResumen.addEventListener("click", (e) => {
  if (e.target === overlayResumen) overlayResumen.classList.remove("visible");
});

btnEnviarCocina.addEventListener("click", () => {
  if (carrito.length === 0) return;

  const mesa = CONFIG.restaurante.mesa;
  const items = carrito.map(item => ({
    nombre: item.nombre,
    precio: item.precio,
    cantidad: item.cantidad,
    notas: item.notas||""
  }));
  const total = totalCarrito();

  btnEnviarCocina.disabled = true;
  btnEnviarCocina.textContent = "Enviando...";

  // Si en 5s el backend no responde (caído, sin conexión, etc.) avisamos
  // en vez de dejar al cliente esperando indefinidamente.
  const timeoutEnvio = setTimeout(() => {
    btnEnviarCocina.disabled = false;
    btnEnviarCocina.textContent = "Confirmar y enviar a cocina";
    alert("No se pudo enviar el pedido a cocina. Comprueba la conexión e inténtalo de nuevo.");
  }, 5000);

  socket.emit("nuevo-pedido", { mesa, items, total });

  socket.once("pedido-confirmado", () => {
    clearTimeout(timeoutEnvio);
    btnEnviarCocina.disabled = false;
    btnEnviarCocina.textContent = "Confirmar y enviar a cocina";

    overlayResumen.classList.remove("visible");
    overlayConfirmacion.classList.add("visible");

    carrito = [];
    actualizarBarra();

    setTimeout(() => {
      overlayConfirmacion.classList.remove("visible");
    }, 2600);
  });

  socket.once("error-pedido", (datos) => {
    clearTimeout(timeoutEnvio);
    btnEnviarCocina.disabled = false;
    btnEnviarCocina.textContent = "Confirmar y enviar a cocina";
    alert(datos && datos.mensaje ? datos.mensaje : "No se pudo enviar el pedido. Inténtalo de nuevo.");
  });
});

function cargarYRenderizarCarta() {
  contenido.innerHTML = '<p class="carrito-vacio">Cargando carta...</p>';

  fetch(CONFIG.restaurante.servidorUrl + "/api/carta")
    .then(res => {
      if (!res.ok) throw new Error("Respuesta no válida del servidor");
      return res.json();
    })
    .then(datos => renderizarCarta(datos.categorias, datos.productos))
    .catch(error => {
      console.error("No se pudo cargar la carta:", error);
      contenido.innerHTML = '<p class="carrito-vacio">No se pudo cargar la carta. Comprueba tu conexión e inténtalo de nuevo.</p>';
    });
}

function renderizarCarta(categorias, productos) {
  nav.innerHTML = "";
  contenido.innerHTML = "";

  categorias.forEach((cat, i) => {
    const btn = document.createElement("button");
    btn.className = "tab-cat" + (i === 0 ? " activa" : "");
    btn.textContent = cat.nombre;
    btn.addEventListener("click", () => {
      document.getElementById("sec-" + cat.id).scrollIntoView({ behavior: "smooth" });
      document.querySelectorAll(".tab-cat").forEach(b => b.classList.remove("activa"));
      btn.classList.add("activa");
    });
    nav.appendChild(btn);
  });

  categorias.forEach((cat, i) => {
    const seccion = document.createElement("section");
    seccion.className = "seccion";
    seccion.id = "sec-" + cat.id;

    const titulo = document.createElement("h2");
    titulo.className = "seccion-titulo";
    titulo.textContent = cat.nombre;
    seccion.appendChild(titulo);

    productos
      .filter(p => p.categoria_id === cat.id)
      .forEach(p => seccion.appendChild(renderPlato(p)));

    contenido.appendChild(seccion);

    if (i < categorias.length - 1) {
      const sep = document.createElement("div");
      sep.className = "perforacion";
      contenido.appendChild(sep);
    }
  });
}

cargarYRenderizarCarta();

function renderPlato(p) {
  const div = document.createElement("div");
  div.className = "plato";

  const nombre = document.createElement("div");
  nombre.className = "plato-nombre";
  nombre.innerHTML = p.nombre + (p.popular ? ' <span class="estrella">★ popular</span>' : "");
  div.appendChild(nombre);

  const precio = document.createElement("div");
  precio.className = "plato-precio";
  precio.textContent = formatoPrecio(p.precio);
  div.appendChild(precio);

  if (p.descripcion) {
    const desc = document.createElement("div");
    desc.className = "plato-desc";
    desc.textContent = p.descripcion;
    div.appendChild(desc);
  }

  if (p.alergenos.length) {
    const cont = document.createElement("div");
    cont.className = "alergenos";
    p.alergenos.forEach(a => {
      const tag = document.createElement("span");
      tag.className = "alergeno";
      tag.textContent = a;
      cont.appendChild(tag);
    });
    div.appendChild(cont);
  }

  if (CONFIG.restaurante.pedidoActivo) {
    const boton = document.createElement("button");
    boton.className = "btn-anadir";
    boton.textContent = "+ añadir";
    boton.addEventListener("click", () => añadirAlCarrito(p));
    div.appendChild(boton);
  }

  return div;
}
</script>
</body>
</html>
